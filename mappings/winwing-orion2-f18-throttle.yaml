# WinWing Orion 2 — F/A-18 Throttle Handles + Base
# Default button mapping (Windows DCS button IDs)
#
# DCS Device Name: "WINWING Orion Throttle Base II + F18 HANDLE"
# (newer firmware: "WINCTRL Orion Throttle Base II + F18 HANDLE")
#
# The F/A-18 throttle replicates the real F/A-18C Hornet throttle quadrant.
# Total reported buttons: 80 (handles + base combined), 6 axes
# The throttle has two handles (Left and Right) plus a base panel with
# toggle switches, rotary encoders, and additional controls.
#
# IMPORTANT: This mapping is a best-effort default based on community research.
# Exact button IDs should be verified using WinWing SimAppPro or DCS's
# controller settings page. Button numbers may vary with firmware version.
#
# Note: Your image should have numbered circles at each button/hat/switch location.
# The numbers in this file (1, 2, 3...) correspond to the circled numbers on YOUR image.
#
# Sources:
#   - WinWing SimAppPro button testing
#   - DCS World controller configuration
#   - Community maps from digitalcombatsimulator.com
#   - SimulatorHardware.com specification (80 buttons, 6 axes confirmed)

device_name: "WINWING Orion Throttle Base II + F18 HANDLE"
device_name_alt: "WINCTRL Orion Throttle Base II + F18 HANDLE"
description: "WinWing Orion 2 Throttle with F/A-18 Handles (80 buttons, 6 axes)"

# Axes provided by the throttle (6 total)
axes:
  - id: "JOY_Z"
    description: "Left Throttle Axis"
  - id: "JOY_RZ"
    description: "Right Throttle Axis"
  - id: "JOY_SLIDER1"
    description: "Antenna Elevation Wheel (Left Handle)"
  - id: "JOY_SLIDER2"
    description: "Radar Elevation Wheel (Right Handle)"
  - id: "JOY_RX"
    description: "TDC Mini-Stick X (if analog mode)"
  - id: "JOY_RY"
    description: "TDC Mini-Stick Y (if analog mode)"

# Maps the NUMBER visible in the image circle -> DCS button ID
mappings:
  # ═══════════════════════════════════════════════════════════════
  # LEFT HANDLE (F/A-18 left throttle grip)
  # ═══════════════════════════════════════════════════════════════

  # --- Comm Switch (4-way + push) ---
  1: "JOY_BTN1"            # Comm Switch - Forward (COMM1)
  2: "JOY_BTN2"            # Comm Switch - Aft (COMM2)
  3: "JOY_BTN3"            # Comm Switch - Left (IFF)
  4: "JOY_BTN4"            # Comm Switch - Right (ILS)
  5: "JOY_BTN5"            # Comm Switch - Push (PLAIN)

  # --- Throttle Designator Controller (4-way + push) ---
  6: "JOY_BTN6"            # TDC - Forward (Up)
  7: "JOY_BTN7"            # TDC - Aft (Down)
  8: "JOY_BTN8"            # TDC - Left
  9: "JOY_BTN9"            # TDC - Right
  10: "JOY_BTN10"          # TDC - Push (Depress)

  # --- Speed Brake (2-way momentary) ---
  11: "JOY_BTN11"          # Speed Brake - Forward (Retract)
  12: "JOY_BTN12"          # Speed Brake - Aft (Extend)

  # --- Left Throttle Finger Lift ---
  13: "JOY_BTN13"          # Left Finger Lift (Idle Detent)

  # --- Dispenser / CM Switch (4-way + push) ---
  14: "JOY_BTN14"          # Dispenser - Forward (ECM)
  15: "JOY_BTN15"          # Dispenser - Aft (JETT)
  16: "JOY_BTN16"          # Dispenser - Left (ALE-47 Manual)
  17: "JOY_BTN17"          # Dispenser - Right (Bypass)
  18: "JOY_BTN18"          # Dispenser - Push (Dispense)

  # ═══════════════════════════════════════════════════════════════
  # RIGHT HANDLE (F/A-18 right throttle grip)
  # ═══════════════════════════════════════════════════════════════

  # --- Mic Switch (4-way + push) ---
  19: "JOY_BTN19"          # Mic Switch - Forward
  20: "JOY_BTN20"          # Mic Switch - Aft
  21: "JOY_BTN21"          # Mic Switch - Left
  22: "JOY_BTN22"          # Mic Switch - Right
  23: "JOY_BTN23"          # Mic Switch - Push

  # --- Cage/Uncage ---
  24: "JOY_BTN24"          # Cage/Uncage Button

  # --- Right Throttle Finger Lift ---
  25: "JOY_BTN25"          # Right Finger Lift (Idle Detent)

  # --- A/A - A/G Selector (2-way) ---
  26: "JOY_BTN26"          # A/A Weapon Select - Forward
  27: "JOY_BTN27"          # A/G Weapon Select - Aft

  # --- Pinky Rocker (2-way) ---
  28: "JOY_BTN28"          # Pinky Rocker - Forward
